# ========================
# 规则引擎（rules）
# ========================
rules:
  # ===========================================================
  # 规则顺序: 域名规则 > IP 规则 > 最终匹配
  # 1. 优先处理需要精确匹配的域名规则
  # ===========================================================

  # 1.1 本地/特殊规则
  - RULE-SET,TEST_Domain,Test
  - RULE-SET,Block_Domain,Block
  - RULE-SET,Private_Domain,国内

  # 1.2 AI 服务 (最高优先级)
  - RULE-SET,OtherAI_Domain,AI
  - RULE-SET,Claude_Domain,AI
  - RULE-SET,ChatGPT_Domain,AI
  - RULE-SET,Gemini_Domain,Gemini-API
  - RULE-SET,Groq_Domain,AI
  - RULE-SET,Copilot_Domain,AI
  - RULE-SET,MetaAI_Domain,Meta AI
  - RULE-SET,Perplexity_Domain,Perplexity

  # 1.3 Twitter (第二优先级)
  - RULE-SET,Twitter_Domain,Twitter
  - RULE-SET,Grok_Domain,Twitter

  # 1.4 Google + YouTube (同一家，YouTube 在前)
  - RULE-SET,Youtube_Domain,Youtube
  - RULE-SET,Google_Domain,Google

  # 1.5 GitHub
  - RULE-SET,GitHub_Domain,GitHub

  # 1.6 Crypto
  - RULE-SET,OKX_Domain,Crypto
  - RULE-SET,Bybit_Domain,Crypto
  - RULE-SET,Binance_Domain,Crypto

  # 1.7 重要的需代理的网站和服务
  - RULE-SET,Reddit_Domain,Reddit
  - RULE-SET,Microsoft_Domain,Microsoft
  - RULE-SET,Apple_Domain,Apple
  - RULE-SET,AppleCN_Domain,Apple
  - RULE-SET,Nvidia_Domain,Nvidia

  # 1.8 社交多媒体平台
  - RULE-SET,WhatsApp_Domain,Stream Media
  - RULE-SET,Facebook_Domain,Stream Media
  - RULE-SET,Telegram_Domain,Stream Media
  - RULE-SET,TikTok_Domain,Stream Media
  - RULE-SET,Netflix_Domain,Stream Media
  - RULE-SET,Disney_Domain,Stream Media
  - RULE-SET,Amazon_Domain,Stream Media
  - RULE-SET,HBO_Domain,Stream Media
  - RULE-SET,Crunchyroll_Domain,Stream Media
  - RULE-SET,Popcorn_Domain,Stream Media
  - RULE-SET,Spotify_Domain,Stream Media

  # 1.9 娱乐游戏服务
  - RULE-SET,Steam_Domain,Games
  - RULE-SET,Epic_Domain,Games
  - RULE-SET,EA_Domain,Games
  - RULE-SET,Blizzard_Domain,Games
