  - name: 美国RN-手选
    type: select
    include-all: true
    filter: "(?=.*(QRN111|QRN142|SAP-US|-WS|WS-TLS|cname|889288|cdn|cloudflare|cf|xn|snippet|Snippets|SNIP|SNSDS|Pages|CFW|电信|移动|联通)).*$"
    
  - name: 美国RN-智选
    type: smart
