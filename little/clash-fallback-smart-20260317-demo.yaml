# ========================
# Clash-ALL 优化配置
# ========================

# 机场节点订阅

proxy-providers:

  1、糖果云IEPL:
    url: "机场订阅地址"
    type: http
    interval: 604800
    health-check:
      enable: true
      url: https://www.gstatic.com/generate_204
      interval: 180
    filter: "^((?!(邮箱|直连|拒绝|域名|问题|访问|订阅|失败|失联|剩余|流量|距离|下次|重置|套餐|到期|官网|刷新|失败|异常|公告)).)*$"   
    
  2、谷歌云-200G:
    url: "自建节点订阅地址"
    type: http
    interval: 86400
    health-check:
      enable: true
      url: https://www.gstatic.com/generate_204
      interval: 180
    filter: "^((?!(直连|拒绝|域名|问题|访问|订阅|失败|失联|剩余|流量|距离|下次|重置|套餐|到期|官网|刷新|失败|异常|公告)).)*$"   

proxies:
  - {name: 直连, type: direct}
  - {name: 拒绝, type: reject}

# ========================
# 主要端口设置
# ========================
port: 7890
socks-port: 7891
redir-port: 7892
mixed-port: 7893
tproxy-port: 7895

allow-lan: true
mode: rule
log-level: info

external-controller: 0.0.0.0:9090
# external-ui: ui
# external-ui-name: zashboard
# external-ui-url: https://github.com/Zephyruso/zashboard/archive/refs/heads/gh-pages.zip
secret: "123456"

# ========================
# DNS 设置
# ========================
dns:
  enable: true
  listen: 0.0.0.0:7874
  ipv6: false
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  # 默认：国外解析（建议只放 DoH/DoT，避免污染）
  nameserver:
    - https://cloudflare-dns.com/dns-query
    - https://dns.google/dns-query
  # 国内解析：仅用于 CN 域名（直连，速度快）
  nameserver-policy:
    "geosite:cn":
      - 223.5.5.5
      - 119.29.29.29
      # - 202.103.0.68
      # - 202.103.24.68
      # - 202.103.44.150
    "geoip:cn":
      - 223.5.5.5
      - 119.29.29.29
      # - 202.103.0.68
      # - 202.103.24.68
      # - 202.103.44.150
  # 用于解析“节点服务器域名”的 DNS（强烈建议用国内直连DNS，避免代理死循环）
  proxy-server-nameserver:
    - 223.5.5.5
    - 119.29.29.29
  # 可选：fallback 通常用来做兜底（可不用）
  fallback:
    - https://cloudflare-dns.com/dns-query
    - https://dns.google/dns-query

ipv6: false

# ========================
# TUN 模块
# ========================
tun:
  enable: true
  stack: gvisor
  endpoint-independent-nat: true
  auto-route: false
  auto-detect-interface: false
  auto-redirect: false
  strict-route: false

profile:
  store-selected: true
  store-fake-ip: true

# ========================
# 策略组定义
# ========================
default: &default
  type: select
  proxies:
    - 所有-智选
    - 所有-手选
    - 所有-自动
    - 香港-故转
    - 香港-智选
    - 香港-手选
    - 香港-自动
    - 新加坡-故转
    - 新加坡-智选
    - 新加坡-手选
    - 新加坡-自动
    - 美国-故转
    - 美国-智选
    - 美国-手选
    - 美国-自动
    - 美国RN-故转
    - 美国RN-手选
    - 美国RN-智选
    - 美国RN-自动
    - 台湾-故转
    - 台湾-智选
    - 台湾-自动
    - 日本-故转
    - 日本-智选
    - 日本-自动
    - 其他-故转
    - 直连
    - 拒绝

proxy-groups:

  # 业务分流组

  # Twitter 单独策略组（不允许直连）
  - name: Twitter
    type: select
    proxies:
      - 香港-故转
      - 台湾-故转
      - 新加坡-故转

  # Gemini / Generative Language API 专用策略组（主用固定 + 备用故转）：
  # - 原因：Gemini API 的可用性和 gstatic_204 不一致，必须用真实 API 作为探测目标。
  # - 设计目标：默认固定走“新加坡-故转”，仅当该链路不可用时才切换到备用地区，降低频繁换出口的风险。
  - name: Gemini-API
    type: fallback
    url: "https://generativelanguage.googleapis.com/$discovery/rest?version=v1beta"
    interval: 600
    lazy: false
    proxies:
      - 新加坡-故转
      - 台湾-故转
      - 日本-故转
      - 美国-故转
      - 所有-手选
      - 拒绝

  - {name: AI, <<: *default}
  - {name: Meta AI, <<: *default}
  - {name: Perplexity, <<: *default}
  - {name: Stream Media, <<: *default}
  - {name: Youtube, <<: *default}
  - {name: Google, <<: *default}
  - {name: GitHub, <<: *default}
  - {name: Reddit, <<: *default}  
  - {name: Nvidia, <<: *default}
  - {name: Apple, <<: *default}
  - {name: Microsoft, <<: *default}
  - {name: Games, <<: *default}
  - {name: Crypto, <<: *default}
  - {name: Test, <<: *default}
  - {name: Block, <<: *default}
  - {name: 国外, <<: *default}
  - {name: 国内, <<: *default}
  - {name: 其他, <<: *default}  

  # 所有组

  - name: 所有-手选
    type: select
    include-all: true
    filter: "^((?!(直连|拒绝|域名|问题|访问|订阅|失败|失联|剩余|流量|距离|下次|重置|套餐|到期|官网|刷新|失败|异常|公告)).)*$"

  - name: 所有-智选
    type: smart
    include-all: true
    policy-priority: "(?=.*糖果云).*$:1.6;(?=.*红杏云).*$:1.5;(?=.*冰云).*$:1.4;(?=.*QGPC1-200G).*$:1.3;(?=.*69云).*$:1.0;(?=.*QRN142).*$:1.1;(?=.*CFV).*$:0.8;.*:1.0"
    uselightgbm: true
    collectdata: true
    health-check: 
      enable: true
      url: https://www.gstatic.com/generate_204
      interval: 60
      tolerance: 2
    strategy: sticky-sessions
    interval: 180
    filter: "^((?!(直连|拒绝|域名|问题|访问|订阅|失败|失联|剩余|流量|距离|下次|重置|套餐|到期|官网|刷新|失败|异常|公告)).)*$"
    
  - name: 所有-自动
    type: url-test
    include-all: true
    tolerance: 50
    interval: 300
    filter: "^((?!(直连|拒绝|域名|问题|访问|订阅|失败|失联|剩余|流量|距离|下次|重置|套餐|到期|官网|刷新|失败|异常|公告)).)*$"

  # 香港组

  - name: 香港-故转
    type: fallback
    interval: 180
    lazy: false
    proxies:
      - 香港-手选
      - 香港-智选
      - 香港-自动
  
  - name: 香港-手选
    type: select
    include-all: true
    filter: "(?=.*(广港|香港|HK|Hong Kong|🇭🇰|HongKong)).*$"
    
  - name: 香港-智选
    type: smart
    include-all: true
    policy-priority: "(?=.*糖果云).*$:1.5;(?=.*红杏云).*$:1.4;(?=.*冰云).*$:1.3;(?=.*69云).*$:1.1;.*:1.0"
    uselightgbm: true
    collectdata: true
    health-check: 
      enable: true
      url: https://www.gstatic.com/generate_204
      interval: 60
      tolerance: 2
    strategy: sticky-sessions
    interval: 180
    filter: "(?=.*(广港|香港|HK|Hong Kong|🇭🇰|HongKong)).*$"
    
  - name: 香港-自动
    type: url-test
    include-all: true
    tolerance: 50
    interval: 300
    filter: "(?=.*(广港|香港|HK|Hong Kong|🇭🇰|HongKong)).*$"

  # 新加坡组

  - name: 新加坡-故转
